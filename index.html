<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#F7F6F2"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="LDH Studio"/>
  <title>LDH Studio — Work Log</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#F2F2F7;--sur:#FFFFFF;--sur2:#F2F2F7;--sur3:#E5E5EA;
      --sep:rgba(60,60,67,.18);--sep2:rgba(60,60,67,.08);
      --lbl:#000;--lbl2:rgba(60,60,67,.6);--lbl3:rgba(60,60,67,.3);--lbl4:rgba(60,60,67,.18);
      --blue:#007AFF;--green:#34C759;--red:#FF3B30;--orange:#FF9500;--purple:#AF52DE;
      --r:12px;--r2:16px;--r3:22px;
      --shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.06);
      --shadow2:0 4px 16px rgba(0,0,0,.1),0 1px 0 rgba(255,255,255,.8) inset;
      --modal-shadow:0 24px 80px rgba(0,0,0,.28);
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;min-height:100%}
    body{background:var(--bg);color:var(--lbl);font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
    ::-webkit-scrollbar{width:0}
    input,textarea,select,button{font-family:inherit;-webkit-appearance:none;appearance:none}
    input::placeholder,textarea::placeholder{color:var(--lbl3)}
    input:focus,textarea:focus,select:focus{outline:none;box-shadow:0 0 0 3.5px rgba(0,122,255,.25)!important;border-color:var(--blue)!important}
    input[type=date]::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer}
    input[type=color]{-webkit-appearance:none;border:none;padding:0;cursor:pointer;border-radius:10px}
    input[type=color]::-webkit-color-swatch-wrapper{padding:0}
    input[type=color]::-webkit-color-swatch{border:none;border-radius:8px}
    input[type=checkbox]{width:20px;height:20px;accent-color:var(--blue);cursor:pointer}
    button{cursor:pointer}
    button:active{opacity:.65;transform:scale(.96)}
    select{cursor:pointer}
    #loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:14px;z-index:999}
    .spin{width:32px;height:32px;border:2.5px solid rgba(0,0,0,.1);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes scaleIn{from{transform:scale(.93) translateY(8px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    details>summary{list-style:none}details>summary::-webkit-details-marker{display:none}
  </style>
</head>
<body>
  <div id="loading"><div class="spin"></div><div style="font-size:13px;color:#B0ACA4;letter-spacing:.1em;text-transform:uppercase">Loading…</div></div>
  <div id="root"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
buildProposalHtml = function(p, s) {
    var st = s||{};
    var studioName = st.yourName||"LDH Studio";
    var addr = st.yourAddress||"";
    var phone = st.yourPhone||"";
    var email = st.yourEmail||"";
    var sub = (p.items||[]).reduce(function(acc,it){ return acc+(parseFloat(it.qty)||0)*(parseFloat(it.unitPrice)||0); },0);
    var disc = parseFloat(p.discountAmt)>0?parseFloat(p.discountAmt):(parseFloat(p.discountPct)>0?sub*parseFloat(p.discountPct)/100:0);
    var total = Math.max(0, sub-disc);
    var validUntil = p.validDays ? new Date(Date.now()+parseInt(p.validDays)*86400000).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}) : "";
    var dateStr = new Date().toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"});
    var itemRows = (p.items||[]).map(function(it,i){
      var amt=(parseFloat(it.qty)||0)*(parseFloat(it.unitPrice)||0);
      return "<tr style='background:"+(i%2===0?"#fff":"#EDE5F8")+"'><td style='padding:10px 14px;font-size:13px;border-bottom:1px solid #e8e0f4'>"+it.description+"</td><td style='padding:10px 14px;font-size:13px;border-bottom:1px solid #e8e0f4;text-align:center'>"+it.qty+"</td><td style='padding:10px 14px;font-size:13px;border-bottom:1px solid #e8e0f4;text-align:right'>"+fmt(it.unitPrice)+"</td><td style='padding:10px 14px;font-size:13px;border-bottom:1px solid #e8e0f4;text-align:right;font-weight:600'>"+fmt(amt)+"</td></tr>";
    }).join("");
    var discRow = disc>0?"<div style='display:flex;justify-content:flex-end;padding:0 24px 8px'><div style='font-size:13px;color:#888'>Discount "+(p.discountPct?p.discountPct+"%":"flat")+" &minus; "+fmt(disc)+"</div></div>":"";
    var noteHtml = p.notes?"<div style='margin:0 24px 24px;padding:14px;background:#f9f9f9;border-left:4px solid #7B2FBE;font-size:12px;color:#555'><strong>Notes:</strong> "+p.notes+"</div>":"";
    var validHtml = validUntil?"<div style='margin:0 24px 24px;padding:14px;background:#F3EEFF;border-radius:8px;font-size:13px;color:#6B3FA0;text-align:center'>This proposal is valid until <strong>"+validUntil+"</strong>.</div>":"";
    var appUrl = p._appUrl || "";
    var acceptHtml = "<div style='margin:0 24px 32px;text-align:center'>"
      +"<a href='"+appUrl+"&accept=1' style='display:inline-block;background:#7B2FBE;color:#fff;font-family:Outfit,-apple-system,Helvetica,sans-serif;font-size:17px;font-weight:800;padding:16px 40px;border-radius:14px;text-decoration:none;letter-spacing:-.02em;box-shadow:0 4px 16px rgba(123,47,190,.4)'>✓ Accept Proposal</div>"
      +"<div style='font-size:12px;color:#B0ACA4;margin-top:10px'>By clicking Accept, you agree to the terms outlined above.</div>"
      +"</div>";
    var introHtml = p.intro?"<div style='padding:0 24px 20px;font-size:14px;color:#555;line-height:1.7;border-bottom:1px solid #eee;margin-bottom:4px;font-style:italic'>"+p.intro+"</div>":"";
    var emailHtml = email?"<br>"+email:"";
    return "<!DOCTYPE html><html><head><meta charset='utf-8'><title>"+p.subject+"</title>"
      +"<style>@import url('https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,400;0,700;0,800;1,700&display=swap');"
      +"*{box-sizing:border-box;margin:0;padding:0}"
      +"body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,sans-serif;background:#f4f4f4;padding:24px 16px}"
      +".page{background:#fff;max-width:720px;margin:0 auto;box-shadow:0 2px 24px rgba(0,0,0,.1)}"
      +"@media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}body{background:#fff;padding:0}.page{box-shadow:none}@page{margin:.5cm;size:A4}}"
      +"@media(max-width:600px){"
      +"body{padding:8px 0!important}.page{border-radius:0!important;box-shadow:none!important}"
      +"div[style*='clip-path']{clip-path:none!important;padding-left:16px!important}"
      +"div[style*='grid-template-columns: 3fr 2fr']{display:block!important}"
      +"div[style*='grid-template-columns: 1fr 1fr']{display:flex!important;flex-wrap:wrap!important}"
      +"table{font-size:11px!important;width:100%!important}th,td{padding:6px 8px!important;font-size:11px!important}"
      +"div[style*='justify-content:flex-end']{justify-content:stretch!important}"
      +"div[style*='justify-content:flex-end']>div{width:100%!important;min-width:unset!important;justify-content:space-between!important;padding:12px 16px!important}"
      +"div[style*='padding:20px 24px'],div[style*='padding:0 24px']{padding:12px 16px!important}"
      +"div[style*='margin:0 24px']{margin:0 12px!important}"
      +"}"
      +"</style></head><body><div class='page'>"
      // ── Header bar — identical to invoice ──
      +"<div style='display:flex;align-items:stretch;min-height:72px'>"
        +"<div style='background:#fff;padding:16px 24px;display:flex;align-items:center;flex:1'>"
          +"<div style='font-size:26px;font-weight:800;color:#7B2FBE;letter-spacing:-.02em'>"
            +"<span style='font-style:normal;color:#1A1814'>"+studioName+"</span>"
          +"</div>"
        +"</div>"
        +"<div style='background:#7B2FBE;padding:16px 32px;display:flex;align-items:center;min-width:220px;clip-path:polygon(16px 0,100% 0,100% 100%,0 100%)'>"
          +"<div style='font-size:30px;font-style:italic;font-weight:700;color:#fff;padding-left:12px'>Proposal</div>"
        +"</div>"
      +"</div>"
      // ── Your contact info ──
      +"<div style='padding:20px 24px 16px;font-size:13px;color:#444;line-height:1.7'>"
        +addr+(addr?"<br>":"")
        +phone+(phone?"<br>":"")
        +(email?email+"<br>":"")
      +"</div>"
      // ── Client info + date grid ──
      +"<div style='display:grid;grid-template-columns:3fr 2fr;gap:0;margin:0 24px 20px'>"
        +"<div style='background:#7B2FBE;padding:8px 14px'><div style='font-size:12px;font-weight:700;color:#fff'>Prepared For:</div></div>"
        +"<div style='display:grid;grid-template-columns:1fr 1fr'>"
          +"<div style='background:#7B2FBE;padding:8px 14px'><div style='font-size:12px;font-weight:700;color:#fff'>Date</div></div>"
          +"<div style='background:#7B2FBE;padding:8px 14px'><div style='font-size:12px;font-weight:700;color:#fff'>Valid Until</div></div>"
        +"</div>"
        +"<div style='background:#EDE5F8;padding:10px 14px;font-size:14px;font-weight:600;color:#1A1814'>"
          +p.clientName
          +(p.clientEmail?"<br><span style='font-size:11px;font-weight:400;color:#888'>"+p.clientEmail+"</span>":"")
          +(p.clientAddress?"<br><span style='font-size:11px;font-weight:400;color:#888'>"+p.clientAddress+"</span>":"")
        +"</div>"
        +"<div style='display:grid;grid-template-columns:1fr 1fr'>"
          +"<div style='background:#EDE5F8;padding:10px 14px;font-size:14px;font-weight:600;color:#1A1814'>"+dateStr+"</div>"
          +"<div style='background:#EDE5F8;padding:10px 14px;font-size:14px;font-weight:600;color:#1A1814'>"+validUntil+"</div>"
        +"</div>"
      +"</div>"
      // ── Subject ──
      +"<div style='padding:0 24px 12px;font-size:18px;font-weight:800;color:#1A1814;letter-spacing:-.02em'>"+p.subject+"</div>"
      // ── Intro ──
      +introHtml
      // ── Line items table ──
      +"<div style='margin:16px 24px 24px'>"
        +"<table style='width:100%;border-collapse:collapse'>"
          +"<thead><tr style='background:#7B2FBE'>"
            +"<th style='padding:9px 14px;font-size:12px;font-weight:700;color:#fff;text-align:left'>Description</th>"
            +"<th style='padding:9px 14px;font-size:12px;font-weight:700;color:#fff;text-align:center;width:60px'>Qty</th>"
            +"<th style='padding:9px 14px;font-size:12px;font-weight:700;color:#fff;text-align:right;width:110px'>Unit Price</th>"
            +"<th style='padding:9px 14px;font-size:12px;font-weight:700;color:#fff;text-align:right;width:110px'>Amount</th>"
          +"</tr></thead>"
          +"<tbody>"+itemRows+"</tbody>"
        +"</table>"
      +"</div>"
      // ── Discount line ──
      +discRow
      // ── Total box — identical to invoice ──
      +"<div style='display:flex;justify-content:flex-end;padding:0 24px 36px'>"
        +"<div style='background:#7B2FBE;padding:12px 28px;display:flex;align-items:center;gap:32px;min-width:280px'>"
          +"<div style='font-size:16px;font-weight:800;color:#fff;letter-spacing:.04em'>TOTAL</div>"
          +"<div style='font-size:22px;font-weight:800;color:#fff'>"+fmt(total)+"</div>"
        +"</div>"
      +"</div>"
      +noteHtml
      +validHtml
      +acceptHtml
      +"<div style='height:20px'></div>"
      // Accept button - only if app URL is known
      +(p._appUrl ? "<div style='padding:0 24px 40px;text-align:center'>"
        +"<div style='font-size:14px;color:#888;margin-bottom:16px'>Ready to move forward? Accept this proposal to get started.</div>"
        +"<a href='"+(p._appUrl ? p._appUrl.replace("proposal.html","accepted.html") : window.location.origin+"/accepted.html")+"?propId="+p.id+"' style='display:inline-block;background:#7B2FBE;color:#fff;font-family:Outfit,-apple-system,Helvetica,sans-serif;font-size:18px;font-weight:800;padding:16px 48px;border-radius:14px;text-decoration:none;letter-spacing:-.02em;box-shadow:0 4px 20px rgba(123,47,190,.4)'>✓ Accept Proposal</a>"
        +"<div style='font-size:12px;color:#aaa;margin-top:12px'>Clicking accept will notify "+studioName+" and create your project.</div>"
        +"</div>" : "")
      +"</div></body></html>";
